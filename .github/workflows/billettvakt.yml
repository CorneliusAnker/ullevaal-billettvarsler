name: Billettovervaaking

# Overvaaker Frogner-billettene (Norge vs England, kvartfinale 11. juli 2026).
# Kjorer i GitHubs sky slik at PC-en din ikke trenger a sta paa.
# (Ullevaal-sjekken er fjernet -- de billettene er i boks.)
on:
  schedule:
    # Hvert 5. minutt, med offset (:02, :07, :12 ...). GitHub anbefaler aa unngaa
    # "runde" minutter (:00, :05) der lasten er hoyest og planlagte jobber oftest
    # droppes stille. Fila heter billettvakt.yml (ikke monitor.yml) med vilje:
    # nytt filnavn = ny workflow-ID = fersk schedule-registrering hos GitHub,
    # etter at cron-en aldri vaaknet igjen etter deaktiveringen 29. juni.
    - cron: "2-57/5 * * * *"
  workflow_dispatch: {}   # gjor det mulig a kjore manuelt fra Actions-fanen

# Ikke kjor to sjekker oppa hverandre (de deler statusfila).
concurrency:
  group: billettovervaaking
  cancel-in-progress: false

# Trengs for at jobben kan committe oppdatert status tilbake til repoet.
permissions:
  contents: write

jobs:
  sjekk:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Sjekk Frogner fanpark (Norge vs England)
        env:
          # NTFY_TOPIC settes som en "Secret" i repo-innstillingene (se README).
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # I skyen finnes ingen skjerm/hoyttaler -> kun ntfy.
          NOTIFY_NTFY: "true"
          NOTIFY_TOAST: "false"
          NOTIFY_SOUND: "false"
        # Egen statusfil i skyen (committes under), separat fra den lokale.
        run: python fanpark_monitor.py --once --state-file state/fanpark_state_ci.json

      - name: Daglig heartbeat (dodmannsknapp)
        # Sender ETT lavprioritets ntfy-ping per dag som bevis paa at cron-en
        # faktisk kjorer. Uteblir pinget en hel dag -> sjekk Actions-fanen.
        # Kjorer med vilje KUN naar Frogner-sjekken over lyktes: pinget skal
        # bety "en vellykket sjekk har faktisk kjort i dag", ikke bare
        # "workflowen startet".
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          today=$(date -u +%F)
          last=$(cat state/last_heartbeat.txt 2>/dev/null || echo "")
          if [ "$today" != "$last" ]; then
            if curl -s --fail --max-time 15 \
              -H "Title: Overvaakingen lever" \
              -H "Priority: min" \
              -H "Tags: green_circle" \
              -d "Daglig livstegn fra Frogner-overvaakingen i skyen. Uteblir dette en hel dag: sjekk Actions-fanen paa GitHub." \
              "https://ntfy.sh/$NTFY_TOPIC" > /dev/null; then
              echo "$today" > state/last_heartbeat.txt
              echo "Heartbeat sendt."
            else
              echo "Klarte ikke sende heartbeat -- proever igjen neste kjoring."
            fi
          else
            echo "Heartbeat allerede sendt i dag ($last)."
          fi

      - name: Lagre status hvis den endret seg
        if: always()
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Oppdater overvaakingsstatus [skip ci]"
            git push
          else
            echo "Ingen statusendring -- ingenting a lagre."
          fi
